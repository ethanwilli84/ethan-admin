name: AI Research Sync

on:
  schedule:
    - cron: '0 11 * * *'  # 7am ET daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run daily AI research scan
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "${{ secrets.ADMIN_URL }}/api/ai-research/sync" \
            --max-time 600)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE"
          python3 -c "
          import json
          try:
            d = json.loads('''$BODY''')
            print(f\"Queries run: {d.get('queriesRun', '?')}\")
            print(f\"Findings surfaced: {d.get('findingsSurfaced', '?')}\")
            print(f\"Findings kept: {d.get('findingsKept', '?')}\")
            print(f\"Elapsed: {d.get('elapsedSeconds', '?')}s\")
            errs = d.get('errors', [])
            if errs:
              print('Errors:')
              for e in errs: print(f'  - {e}')
          except Exception as e:
            print(f'parse error: {e}')
          " 2>&1
          [ "$HTTP_CODE" = "200" ] || exit 1
