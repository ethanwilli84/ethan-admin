name: Auto Gmail Sync

on:
  schedule:
    # Run every 4 hours — archives bounce emails + syncs replies automatically
    - cron: '0 */4 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Gmail replies and archive bounces
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ secrets.ADMIN_URL }}/api/gmail-replies?campaign=influence-outreach")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          # Extract key stats
          REPLIES=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'replies={d.get(\"count\",0)} bounces_archived={d.get(\"bouncesArchived\",0)}')" 2>/dev/null || echo "parse error")
          echo "$REPLIES"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Sync failed with HTTP $HTTP_CODE"
            exit 1
          fi
