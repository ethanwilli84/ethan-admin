name: Daily Finance Sync

on:
  schedule:
    - cron: '0 12 * * *'  # 8 AM EDT (12:00 UTC)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pull QuickBooks data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ secrets.ADMIN_URL }}/api/finance/qbo-sync" \
            --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE"
          python3 -c "
          import json
          try:
            d = json.loads('''$BODY''')
            if d.get('ok'):
              s = d.get('summary', {})
              print(f'✓ QBO sync complete')
              print(f'  Revenue YTD: \${s.get(\"income\",0):,.0f}')
              print(f'  Expenses YTD: \${s.get(\"expenses\",0):,.0f}')
              print(f'  Net Income: \${s.get(\"netIncome\",0):,.0f}')
              print(f'  Transactions: {d.get(\"transactionCount\",0)}')
              print(f'  Anomalies: {len(d.get(\"anomalies\",[]))}')
            else:
              print(f'✗ Sync failed: {d.get(\"error\")}')
          except Exception as e:
            print(f'Parse error: {e}')
            print(f'Body: {\"$BODY\"[:200]}')
          " 2>&1
          [ "$HTTP_CODE" = "200" ] || exit 1
