name: Sync Issues

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pull issues from all channels
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ secrets.ADMIN_URL }}/api/sync-issues" \
            --max-time 120)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE"
          python3 -c "
          import json
          try:
            d = json.loads('''$BODY''')
            s = d.get('synced', {})
            total = sum(s.values())
            print(f'Synced {total} new issues: {s}')
            print(f'Open issues: {d.get(\"openIssues\", \"?\")}')
          except Exception as e:
            print(f'parse error: {e}')
          " 2>&1
          [ "$HTTP_CODE" = "200" ] || exit 1
