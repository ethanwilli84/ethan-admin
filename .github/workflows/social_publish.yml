name: Social Publisher

on:
  # Runs every 15 minutes — API route checks if anything is due right now
  # No hardcoded post times. Change schedule in admin UI, it just works.
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'post | reel | story | all'
        default: 'all'
        required: true
      dry_run:
        description: 'true = preview only'
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Run publisher
        run: |
          MODE="${{ github.event.inputs.mode || 'all' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          echo "mode=$MODE dry_run=$DRY_RUN time=$(date -u)"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.ADMIN_URL }}/api/social/publish" \
            -H "Content-Type: application/json" \
            -d "{\"mode\":\"$MODE\",\"accountId\":\"sire-ship\",\"dryRun\":$DRY_RUN}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"

          [ "$HTTP_CODE" = "200" ] || exit 1
