name: Social Archive Old Records

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Archive old posted queue records (files kept for cycle reuse)
        run: |
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.ADMIN_URL }}/api/social/cleanup" \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "$RESPONSE"
          python3 -c "
          import json,sys
          try:
            d = json.loads('$RESPONSE')
            print(f'Archived {d.get(\"archived\",0)} old queue records')
            print(f'Note: {d.get(\"note\",\"\")}')
            print('Files in DO Spaces untouched — kept for cycle reuse')
          except: print('Parse error:', '$RESPONSE'[:200])
          "
