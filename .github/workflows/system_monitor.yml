name: System Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes, 24/7
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Run health checks and save to admin
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ secrets.ADMIN_URL }}/api/monitor" \
            --max-time 30)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP: $HTTP_CODE"
          python3 -c "
          import json
          try:
            d = json.loads('''$BODY''')
            s = d.get('summary', {})
            m = d.get('metrics', {})
            icon = '✅' if s.get('allClear') else '🚨'
            print(f'{icon} {s.get(\"totalUp\",0)}/{len(d.get(\"results\",[]))} up | stuck payouts: {m.get(\"stuckPayouts\",0)} | defaults today: {m.get(\"newDefaults\",0)}')
            for svc in d.get('results', []):
              st = {'up':'✅','slow':'🐌','down':'❌'}.get(svc['status'],'?')
              print(f'  {st} {svc[\"name\"]:35} {svc[\"responseMs\"]}ms')
          except Exception as e:
            print(f'parse error: {e}')
          " 2>&1

          [ "$HTTP_CODE" = "200" ] || exit 1
