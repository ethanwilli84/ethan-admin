name: AI Research Auto-Apply

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PR_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Configure git
        run: |
          git config user.name "ai-auto-bot"
          git config user.email "ai-auto-bot@users.noreply.github.com"

      - name: Run apply worker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          GH_PR_TOKEN: ${{ secrets.GH_PR_TOKEN }}
          GH_REPO: ethanwilli84/ethan-admin
          AI_AUTO_APPLY_ENABLED: ${{ secrets.AI_AUTO_APPLY_ENABLED || 'false' }}
        run: python3 scripts/ai_research_apply.py
